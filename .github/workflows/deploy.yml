# ============================================================
# BCA Admin — Deploy to Azure App Service
# Builds the Next.js app and deploys it to Azure Web App
#
# REQUIRED GitHub Secrets (Settings → Secrets → Actions):
#   AZURE_CREDENTIALS - Service principal JSON from az ad sp create-for-rbac
#
# See AZURE-SETUP.md for full setup instructions
# ============================================================

name: Deploy BCA Admin

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          SQL_SERVER: build-placeholder
          SQL_DATABASE: build-placeholder
          SQL_USER: build-placeholder
          SQL_PASSWORD: build-placeholder
          SQL_PORT: '1433'
          SQL_ENCRYPT: 'true'
          SQL_TRUST_SERVER_CERT: 'false'

      - name: Remove dev dependencies
        run: npm prune --omit=dev

      - name: Package app
        run: |
          zip -r app.zip \
            .next \
            public \
            package.json \
            package-lock.json \
            next.config.mjs \
            node_modules

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-bca-admin-dev
          package: app.zip
