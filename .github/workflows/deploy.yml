# ============================================================
# BCA Admin — Deploy to Azure Container Apps
# Builds Docker image, pushes to ACR, updates Container App
#
# REQUIRED GitHub Secrets (Settings → Secrets → Actions):
#   AZURE_CREDENTIALS - Service principal JSON from az ad sp create-for-rbac
#   ACR_USERNAME      - ACR admin username (from ACR → Access keys)
#   ACR_PASSWORD      - ACR admin password (from ACR → Access keys)
#
# See AZURE-SETUP.md for full setup instructions
# ============================================================

name: Deploy BCA Admin

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: acrbcaadmindev
  IMAGE_NAME: bca-admin
  CONTAINER_APP_NAME: ca-bca-admin-dev
  RESOURCE_GROUP: rg-bca-admin-dev

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_TAG }} \
            --registry-server ${{ env.ACR_NAME }}.azurecr.io \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }}